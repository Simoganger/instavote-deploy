---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  labels:
    kustomize.toolkit.fluxcd.io/name: instavote
    kustomize.toolkit.fluxcd.io/namespace: instavote
  name: instavote
  namespace: instavote
spec:
  events:
  - ping
  - push
  interval: 10m0s
  resources:
  - kind: GitRepository
    name: instavote
  secretRef:
    name: webhook-token
  type: github
