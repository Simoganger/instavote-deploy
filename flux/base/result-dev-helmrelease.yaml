---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: result
  namespace: instavote
spec:
  chart:
    spec:
      chart: ./helm/chart/result
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: result-dev
  interval: 10m0s
  storageNamespace: instavote
  targetNamespace: instavote
